global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'crypto-trader'

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: 'crypto-trader-app'
    static_configs:
      - targets: ['app:8000']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
